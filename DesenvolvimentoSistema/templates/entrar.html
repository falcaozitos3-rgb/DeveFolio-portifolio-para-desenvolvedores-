
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Entrar - DeveFolio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='entrar.css') }}">
</head>
<body>
    <main>
    <div class="container-principal">
        <div class="lado-direito">
            <h1>Bem-vindo(a)! novamente!</h1>

            <p>Faça login para acessar seu portfólio e continuar sua jornada de desenvolvimento.</p>
        </div>

            <h2>Criar Conta </h2>
            <a href="{{ url_for('index') }}" class="btn-voltar"> &larr; Voltar</a>

                <input type="email" name="email" placeholder="Email">

            </form>
            <p>criptografia de ponta a ponta.</p>
        </div>
        <div class="container-botao">
            <!-- link para cadastro -->
            <a href="{{ url_for('cadastro') }}">
            <button>Não tem conta?</button>
            </a>
            <!-- link para entrar -->
            <a href="{{ url_for('pagina_principal') }}">
            <button>Entrar</button>
            </a>
        </div>
    </main>

</body>
</html>
