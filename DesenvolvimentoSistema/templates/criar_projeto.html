<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTR-8">
    <title> criar seu projeto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='criar_projeto.css') }}">
</head>
<body>
    <main>
        <div class="card">
            <h1>Criar projeto</h1>
            <p class="subititulo">
            <p>Compartilhe sua ideia com outros desenvolvedores.</p>
            </p>
            <form action="{{ url_for('criar_projeto') }}" method="POST">
                <label>Titulo do Projeto</label>
                <input type="text" name="titulo" placeholder="Ex: calculadora simples">

                <label>Descrição</label>
                <input type="text" name="descricao" placeholder="Descreva seu projeto.">

                <label>Tecnologias</label>
                <select name="linguagem">
                    <option>HTML/CSS</option>
                    <option>JavaScript</option>
                    <option>Python</option>
                    <option>Java</option>
                    <option>React</option>
                    <option>react</option>
                </select>

                <button type="submit">
                    Publicar Projeto
                </button>
            </form>
        </div>
    </main>
</body>
</html>
